<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEVEN Remote HUD</title>
    <style>
        :root {
            --bg: #0a0a12;
            --panel: #12121c;
            --accent: #00d2ff;
            --text: #e0e0e0;
            --user: #00ffcc;
            --seven: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* Support for mobile browser bars */
            height: -webkit-fill-available;
            overflow: hidden;
            box-sizing: border-box;
        }

        html {
            height: -webkit-fill-available;
        }

        /* Holographic Header */
        header {
            padding: 15px 20px;
            background: var(--panel);
            border-bottom: 1px solid #1f1f2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .status {
            font-size: 0.7rem;
            color: #777;
            text-transform: uppercase;
        }

        /* Neural Wave Area */
        #wave-container {
            height: 80px;
            width: 100%;
            background: var(--bg);
            position: relative;
            flex-shrink: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* Chat Terminal */
        #chat-terminal {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .msg {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .msg-user {
            align-self: flex-end;
            background: rgba(0, 255, 204, 0.1);
            border-right: 3px solid var(--user);
            color: var(--user);
        }

        .msg-seven {
            align-self: flex-start;
            background: rgba(0, 210, 255, 0.1);
            border-left: 3px solid var(--seven);
            color: var(--seven);
        }

        .meta {
            font-size: 0.65rem;
            color: #555;
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Input Area (Sticky to bottom) */
        #input-area {
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            background: var(--panel);
            border-top: 1px solid #1f1f2e;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 14px;
            color: white;
            outline: none;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            padding: 0 25px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        button:active {
            transform: scale(0.95);
            background: #00b8e6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SEVEN REMOTE</div>
        <div class="status" id="status-text">Online</div>
    </header>

    <div id="wave-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <div id="chat-terminal">
        <!-- Messages will appear here -->
    </div>

    <div id="input-area">
        <input type="text" id="command-input" placeholder="Transmit..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let phase = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = 100;
        }
        window.onresize = resize;
        resize();

        function drawWave() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const midY = canvas.height / 2;
            
            // BG Wave
            ctx.beginPath();
            ctx.strokeStyle = '#005577';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 5) {
                const y = midY + Math.sin(x * 0.015 - phase) * 12 + Math.sin(x * 0.04 - phase * 0.8) * 10;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Main Wave
            ctx.beginPath();
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 2;
            for (let x = 0; x < canvas.width; x += 5) {
                const y = midY + Math.sin(x * 0.02 + phase) * 18 + Math.sin(x * 0.06 + phase * 1.2) * 8;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            phase += 0.05;
            requestAnimationFrame(drawWave);
        }
        drawWave();

        // Communication
        const chat = document.getElementById('chat-terminal');
        const input = document.getElementById('command-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(sender, text) {
            const div = document.createElement('div');
            const cssClass = sender.toLowerCase() === 'seven' ? 'seven' : sender.toLowerCase();
            div.className = `msg msg-${cssClass}`;
            div.innerHTML = `<div class="meta">${sender}</div>${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendCommand() {
            const cmd = input.value.trim();
            if (!cmd) return;

            addMessage('User', cmd);
            input.value = '';

            try {
                const response = await fetch('/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await response.json();
                if (data.reply) addMessage('SEVEN', data.reply);
            } catch (e) {
                console.error("Link Failure:", e);
            }
        }

        sendBtn.onclick = sendCommand;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendCommand(); };

        // Poll for new messages from PC
        setInterval(async () => {
            try {
                const res = await fetch('/messages');
                const data = await res.json();
                data.messages.forEach(m => addMessage(m.sender, m.text));
            } catch (e) {}
        }, 1000);
    </script>
</body>
</html>
